<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edgar Souza FF Site</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    header {
      padding: 30px;
      background: #111;
    }

    h1 {
      margin: 0;
      color: #00ffcc;
    }

    .profile {
      margin-top: 20px;
    }

    .profile img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid #00ffcc;
    }

    .socials {
      margin-top: 20px;
    }

    .socials a {
      display: inline-block;
      margin: 10px;
      padding: 10px 15px;
      background: #00ffcc;
      color: black;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .video-btn {
      margin-top: 30px;
    }

    .video-btn button {
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: red;
      color: white;
      cursor: pointer;
    }

    .video-box {
      margin-top: 20px;
      display: none;
    }

    iframe {
      width: 90%;
      max-width: 500px;
      height: 280px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <header>
    <h1>Edgar Souza FF</h1>
    <p>Bem-vindo ao meu site oficial 🚀</p>
  </header>

  <div class="profile">
    <img src="https://via.placeholder.com/120" alt="perfil">
  </div>

  <div class="socials">
    <a href="https://instagram.com/" target="_blank">Instagram</a>
    <a href="https://youtube.com/" target="_blank">YouTube</a>
    <a href="https://tiktok.com/" target="_blank">TikTok</a>
  </div>

  <div class="video-btn">
    <button onclick="mostrarVideo()">Ver Vídeo</button>
  </div>

  <div class="video-box" id="videoBox">
    <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
  </div>

  <script>
    function mostrarVideo() {
      document.getElementById("videoBox").style.display = "block";
    }
  </script>

</body>
</html>
