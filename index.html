<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edgar Souza FF</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    header {
      background: #1c1c1c;
      padding: 20px;
    }

    /* FOTO DE PERFIL */
    .profile-pic {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-top: 10px;
      border: 3px solid #00bfff;
    }

    a {
      display: block;
      color: #00bfff;
      margin: 5px;
      text-decoration: none;
    }

    input, button {
      padding: 10px;
      margin-top: 10px;
    }

    .card {
      background: #222;
      margin: 10px auto;
      padding: 10px;
      width: 340px;
      border-radius: 10px;
    }

    iframe {
      width: 100%;
      height: 200px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>EDGAR SOUZA FF</h1>

  <!-- FOTO DE PERFIL -->
  <img class="profile-pic" src="https://i.imgur.com/8Km9tLL.png" alt="Foto de perfil">

  <p>🔥 Free Fire • Solo VS Duo • Desafios • Novelinhas</p>

  <h3>Redes Sociais</h3>
  <a href="#">YouTube Oficial</a>
  <a href="#">Instagram Principal</a>
  <a href="#">Instagram Free Fire</a>
  <a href="#">TikTok Oficial</a>
</header>

<hr>

<h2>🎥 Adicionar vídeo por link</h2>

<input type="text" id="videoLink" placeholder="Cole o link do vídeo aqui">
<br>
<button onclick="addVideo()">Adicionar vídeo</button>

<h2>📺 Vídeos</h2>
<div id="videoList"></div>

<script>
let videos = [];

function addVideo() {
  const link = document.getElementById("videoLink").value;

  if (!link) {
    alert("Cole um link de vídeo!");
    return;
  }

  videos.push(link);
  document.getElementById("videoLink").value = "";

  renderVideos();
}

function renderVideos() {
  const container = document.getElementById("videoList");
  container.innerHTML = "";

  videos.forEach(link => {

    let embed = convertToEmbed(link);

    container.innerHTML += `
      <div class="card">
        <iframe src="${embed}" allowfullscreen></iframe>
      </div>
    `;
  });
}

// transforma link do YouTube em embed
function convertToEmbed(url) {
  if (url.includes("watch?v=")) {
    return url.replace("watch?v=", "embed/");
  }
  return url;
}
</script>

</body>
</html>
