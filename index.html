  <h2>Adicionar vídeo do YouTube</h2>

<input type="text" id="videoLink" placeholder="Cole o link do YouTube">
<button onclick="addVideo()">Adicionar</button>

<div id="videos"></div>

<script>
function addVideo() {
  const input = document.getElementById("videoLink");
  const link = input.value;

  if (!link) return;

  let embed = link;

  // transforma link normal em embed
  if (link.includes("watch?v=")) {
    embed = link.replace("watch?v=", "embed/");
  }

  const container = document.getElementById("videos");

  container.innerHTML += `
    <div style="margin:10px auto; max-width:400px;">
      <iframe width="100%" height="220"
        src="${embed}"
        frameborder="0"
        allowfullscreen>
      </iframe>
    </div>
  `;

  input.value = "";
}
</script>
