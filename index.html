<script>
let videos = [];

async function load(){

  const channelId = "UCd7rD5CmxcsJZ0sk";
  const url = "https://www.youtube.com/feeds/videos.xml?channel_id=" + channelId;

  const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(url));
  const data = await res.json();

  videos = data.items;

  const list = document.getElementById("list");

  data.items.forEach((v,i)=>{
    const id = v.link.split("v=")[1];

    const div = document.createElement("div");
    div.className = "video";

    div.innerHTML = `
      <img src="https://img.youtube.com/vi/${id}/hqdefault.jpg">
      <p>${v.title}</p>
    `;

    div.onclick = ()=>{
      document.getElementById("player").src = "https://www.youtube.com/embed/" + id;
      document.getElementById("title").innerText = v.title;
    };

    list.appendChild(div);

    if(i===0){
      document.getElementById("player").src = "https://www.youtube.com/embed/" + id;
      document.getElementById("title").innerText = v.title;
    }
  });
}

function searchVideos(){
  let input = document.querySelector(".search").value.toLowerCase();
  let items = document.getElementsByClassName("video");

  for(let i=0;i<items.length;i++){
    items[i].style.display =
      items[i].innerText.toLowerCase().includes(input) ? "block" : "none";
  }
}

load();
</script>
